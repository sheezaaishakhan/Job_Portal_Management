
<html>
<head>
    <title>Admin Dashboard - Job Portal</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body style="padding-bottom: 80px;">
<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold">Admin Panel</a>
  </div>
</nav>

<div class="container-fluid mt-4">

<div class="row">

<!-- SIDEBAR -->
<div class="col-md-3">

    <div class="list-group">
        <a href="#" class="list-group-item active">Dashboard</a>
        <a href="add-job.html" class="list-group-item">Add Job</a>
        <a href="manage-job.html" class="list-group-item">Manage Jobs</a>
        <a href="applications.html" class="list-group-item">Applications</a>
        <a href="login.html" class="list-group-item text-danger">Logout</a>
    </div>

</div>

<!-- MAIN CONTENT -->
<div class="col-md-9">

    <!-- STATS -->
    <div class="row mb-4">

        <div class="col-md-4">
            <div class="card text-white bg-primary">
                <div class="card-body text-center">
                    <h5>Total Jobs</h5>
                    <h3 id="totalJobsCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-success">
                <div class="card-body text-center">
                    <h5>Applications</h5>
                    <h3 id="totalApplicationsCount">0</h3>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-white bg-warning">
                <div class="card-body text-center">
                    <h5>Candidates</h5>
                    <h3 id="totalCandidatesCount">0</h3>
                </div>
            </div>
        </div>

    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    Recent Applications
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Job</th>
                                <th>Candidate</th>
                                <th>Status</th>
                                <th>Applied</th>
                            </tr>
                        </thead>
                        <tbody id="recentApplicationsBody">
                            <tr><td colspan="5" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <div class="card">
                <div class="card-header">
                    Recent Jobs
                </div>
                <div class="card-body p-0">
                    <table class="table mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Title</th>
                                <th>Company</th>
                                <th>Status</th>
                                <th>Created</th>
                            </tr>
                        </thead>
                        <tbody id="recentJobsBody">
                            <tr><td colspan="5" class="text-center">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

</div>
</div>
</div>

<script>
async function safeFetch(url, options) {
    const res = await fetch(url, options);
    const text = await res.text();
    try {
        return JSON.parse(text);
    } catch (err) {
        throw new Error('Expected JSON but got: ' + text);
    }
}

function apiOrigin() {
    return window.location.protocol + '//' + window.location.host;
}

async function loadDashboard() {
    try {
        const path = window.location.pathname.replace(/\/admin\/frontend\/.*$/,'/admin/backend/dashboard.php');
        const url = apiOrigin() + path;
        const result = await safeFetch(url);
        if (!result.success) {
            if (result.message === 'Unauthorized') {
                window.location.href = 'login.html';
                return;
            }
            throw new Error(result.message || 'Unable to load dashboard');
        }

        const stats = result.data;
        document.getElementById('totalJobsCount').textContent = stats.total_jobs;
        document.getElementById('totalApplicationsCount').textContent = stats.total_applications;
        document.getElementById('totalCandidatesCount').textContent = stats.total_candidates;

        const appsBody = document.getElementById('recentApplicationsBody');
        appsBody.innerHTML = '';
        if (!Array.isArray(stats.recent_applications) || stats.recent_applications.length === 0) {
            appsBody.innerHTML = '<tr><td colspan="5" class="text-center">No recent applications</td></tr>';
        } else {
            stats.recent_applications.forEach(app => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${app.id}</td>
                    <td>${app.title}</td>
                    <td>${app.name}</td>
                    <td>${app.status}</td>
                    <td>${app.applied_date}</td>
                `;
                appsBody.appendChild(row);
            });
        }

        const jobsBody = document.getElementById('recentJobsBody');
        jobsBody.innerHTML = '';
        if (!Array.isArray(stats.recent_jobs) || stats.recent_jobs.length === 0) {
            jobsBody.innerHTML = '<tr><td colspan="5" class="text-center">No recent jobs</td></tr>';
        } else {
            stats.recent_jobs.forEach(job => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${job.id}</td>
                    <td>${job.title}</td>
                    <td>${job.company_name}</td>
                    <td>${job.status}</td>
                    <td>${job.created_at}</td>
                `;
                jobsBody.appendChild(row);
            });
        }
    } catch (err) {
        console.error(err);
    }
}

loadDashboard();
</script>

</body>
</html>
