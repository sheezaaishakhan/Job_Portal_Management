<!DOCTYPE html>
<html>
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand">Add New Job</a>
  </div>
</nav>

<div class="container mt-4">
    <div class="row">
        <div class="col-md-3 mb-4">
            <div class="list-group">
                <a href="dashboard.html" class="list-group-item">Dashboard</a>
                <a href="add-job.html" class="list-group-item active">Add Job</a>
                <a href="manage-job.html" class="list-group-item">Manage Jobs</a>
                <a href="applications.html" class="list-group-item">Applications</a>
                <a href="login.html" class="list-group-item text-danger">Logout</a>
            </div>
        </div>
        <div class="col-md-9">
            <div class="card shadow">

                <div class="card-header bg-success text-white">
                    Job Details Form
                </div>

                <div class="card-body">

        <form id="addJobForm">

            <div class="mb-3">
                <label>Job Title</label>
                <input id="jobTitle" type="text" class="form-control" placeholder="e.g Web Developer">
            </div>

            <div class="mb-3">
                <label>Company Name</label>
                <input id="jobCompany" type="text" class="form-control" placeholder="e.g ABC Tech">
            </div>

            <div class="mb-3">
                <label>Salary</label>
                <input id="jobSalary" type="text" class="form-control" placeholder="e.g 50,000">
            </div>

            <div class="mb-3">
                <label>Description</label>
                <textarea id="jobDescription" class="form-control" rows="4" placeholder="Job details..."></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">Post Job</button>

        </form>

        <script>
        async function safeFetch(url, options) {
            const res = await fetch(url, options);
            const ct = res.headers.get('content-type') || '';
            const status = res.status;
            const text = await res.text();
            console.log('safeFetch ->', url, { status, contentType: ct, bodyPreview: text.slice(0,1000) });
            try {
                return JSON.parse(text);
            } catch (err) {
                throw new Error('Expected JSON but got: ' + text);
            }
        }

        document.getElementById('addJobForm').addEventListener('submit', async function(e){
            e.preventDefault();
            try {
                const fd = new FormData();
                fd.append('title', document.getElementById('jobTitle').value);
                fd.append('company_name', document.getElementById('jobCompany').value);
                fd.append('salary_min', document.getElementById('jobSalary').value);
                fd.append('description', document.getElementById('jobDescription').value);

                function apiOrigin() {
                    const proto = window.location.protocol;
                    const host = window.location.host;
                    return proto + '//' + host;
                }
                const path = window.location.pathname.replace(/\/admin\/frontend\/.*$/,'/admin/backend/jobs.php?action=add');
                const jobsUrl = apiOrigin() + path;
                const data = await safeFetch(jobsUrl, { method: 'POST', body: fd });
                if (data.success) {
                    alert('Job posted successfully');
                    window.location.href = 'manage-job.html';
                } else {
                    alert(data.message || 'Failed to post job');
                }
            } catch (err) {
                console.error(err);
                alert('Error: ' + err.message);
            }
        });
        </script>

    </div>

</div>

</div>

</body>
</html>
