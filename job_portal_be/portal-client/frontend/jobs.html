<html>
<head>
    <title>Jobs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

<nav class="navbar navbar-expand-lg navbar-light bg-light rounded mb-4">
  <div class="container-fluid px-0">
    <div>
      <a class="nav-link d-inline me-3" href="index.html">Home</a>
      <a class="nav-link d-inline me-3" href="jobs.html">Jobs</a>
      <a class="nav-link d-inline" href="candidate-status.html">My Applications</a>
    </div>
  </div>
</nav>

<!-- Search Bar -->
<input id="searchInput" type="text" class="form-control mb-4" placeholder="Search jobs...">

<div id="jobsRow" class="row"></div>

</div>

<script>
async function safeFetch(url, options) {
    const res = await fetch(url, options);
    const ct = res.headers.get('content-type') || '';
    const status = res.status;
    const text = await res.text();
    console.log('safeFetch ->', url, { status, contentType: ct, bodyPreview: text.slice(0,1000) });
    try {
        return JSON.parse(text);
    } catch (err) {
        throw new Error('Expected JSON but got: ' + text);
    }
}

async function loadJobs() {
    try {
        function apiOrigin() {
            const proto = window.location.protocol;
            const host = window.location.host;
            return proto + '//' + host;
        }
        const path = window.location.pathname.replace(/\/portal-client\/frontend\/.*$/,'/portal-client/backend/jobs.php?action=list');
        const jobsUrl = apiOrigin() + path;
        const data = await safeFetch(jobsUrl);
        const row = document.getElementById('jobsRow');
        row.innerHTML = '';
        if (!Array.isArray(data.data)) {
            row.innerHTML = '<div class="col-12">No jobs found</div>';
            return;
        }
        data.data.forEach(job => {
            const col = document.createElement('div');
            col.className = 'col-md-4';
            col.innerHTML = `
              <div class="card mb-3">
                <div class="card-body">
                  <h5 class="card-title">${job.title}</h5>
                  <p class="card-text">Company: ${job.company_name}</p>
                  <a href="apply.html?job_id=${job.id}" class="btn btn-primary">Apply</a>
                </div>
              </div>`;
            row.appendChild(col);
        });
    } catch (err) {
        console.error(err);
        document.getElementById('jobsRow').innerHTML = '<div class="col-12">Error loading jobs</div>';
    }
}

document.getElementById('searchInput').addEventListener('keyup', function(e){
    const q = e.target.value.toLowerCase();
    document.querySelectorAll('#jobsRow .card').forEach(card => {
        const title = card.querySelector('.card-title').textContent.toLowerCase();
        card.parentElement.style.display = title.includes(q) ? '' : 'none';
    });
});

loadJobs();
</script>

</body>
</html>
