<html>
    
<head>
    <title>Apply Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">
<h2 class="text-center mb-4">Apply for Job</h2>

<form id="applyForm">

<div class="mb-3">
<label>Name *</label>
<input id="candidateName" type="text" class="form-control" placeholder="Enter your name" required>
</div>

<div class="mb-3">
<label>Email *</label>
<input id="candidateEmail" type="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label>Phone *</label>
<input id="candidatePhone" type="text" class="form-control" placeholder="Enter your phone" required>
</div>

<div class="mb-3">
<label>City</label>
<input id="candidateCity" type="text" class="form-control" placeholder="Your city (optional)">
</div>

<div class="mb-3">
<label>Education</label>
<input id="candidateEducation" type="text" class="form-control" placeholder="Your education (optional)">
</div>

<div class="mb-3">
<label>Experience (years)</label>
<input id="candidateExperience" type="number" class="form-control" placeholder="Years of experience (optional)">
</div>

<div class="mb-3">
<label>Upload Resume</label>
<input id="candidateResume" type="file" class="form-control" accept=".pdf,.doc,.docx">
<small class="text-muted">Allowed: PDF, DOC, DOCX</small>
</div>

<button type="submit" class="btn btn-success w-100">Submit Application</button>

</form>

<script>
async function safeFetch(url, options) {
    const res = await fetch(url, options);
    const status = res.status;
    const text = await res.text();
    console.log('safeFetch ->', url, { status, bodyPreview: text.slice(0,1000) });
    try {
        return JSON.parse(text);
    } catch (err) {
        throw new Error('Expected JSON but got: ' + text);
    }
}

function apiOrigin() {
    const proto = window.location.protocol;
    const host = window.location.host;
    return proto + '//' + host;
}

// Get job_id from URL query string
const params = new URLSearchParams(window.location.search);
const jobIdFromUrl = params.get('job_id') || '';

document.getElementById('applyForm').addEventListener('submit', async function(e){
    e.preventDefault();
    try {
        const name = document.getElementById('candidateName').value.trim();
        const email = document.getElementById('candidateEmail').value.trim();

        if (!name) {
            alert('Name is required');
            return;
        }

        const namePattern = /^[A-Za-z\u00C0-\u024F\s'\-]+$/;
        if (!namePattern.test(name)) {
            alert('Please enter a valid name without @ or other special characters');
            return;
        }

        const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email || !emailPattern.test(email)) {
            alert('Please enter a valid email');
            return;
        }

        // Get job_id from URL or form hidden field
        const jobId = jobIdFromUrl || document.getElementById('applyJobId')?.value;
        if (!jobId) {
            alert('Job ID is required. Please apply from the jobs list.');
            return;
        }

        // Step 1: Register candidate or get existing candidate_id
        const registerFd = new FormData();
        registerFd.append('name', name);
        registerFd.append('email', email);
        registerFd.append('phone', document.getElementById('candidatePhone').value);
        registerFd.append('city', document.getElementById('candidateCity').value || '');
        registerFd.append('education', document.getElementById('candidateEducation').value || '');
        registerFd.append('experience', document.getElementById('candidateExperience').value || '');

        const resumeInput = document.getElementById('candidateResume');
        if (resumeInput.files.length) {
            registerFd.append('resume', resumeInput.files[0]);
        }

        const registerPath = window.location.pathname.replace(/\/portal-client\/frontend\/.*$/,'/portal-client/backend/candidates.php?action=register');
        const registerUrl = apiOrigin() + registerPath;
        console.log('Registering candidate at:', registerUrl);
        
        const registerData = await safeFetch(registerUrl, { method: 'POST', body: registerFd });
        if (!registerData.success) {
            alert('Registration failed: ' + (registerData.message || 'Unknown error'));
            return;
        }

        const candidateId = registerData.candidate_id;
        console.log('Candidate registered/fetched with ID:', candidateId);

        // Step 2: Apply for job
        const applyFd = new FormData();
        applyFd.append('job_id', jobId);
        applyFd.append('candidate_id', candidateId);

        const applyPath = window.location.pathname.replace(/\/portal-client\/frontend\/.*$/,'/portal-client/backend/candidates.php?action=apply');
        const applyUrl = apiOrigin() + applyPath;
        console.log('Applying for job at:', applyUrl);

        const applyData = await safeFetch(applyUrl, { method: 'POST', body: applyFd });
        if (applyData.success) {
            alert('Application submitted successfully!');
            window.location.href = `candidate-status.html?email=${encodeURIComponent(document.getElementById('candidateEmail').value.trim())}`;
        } else {
            alert('Application failed: ' + (applyData.message || 'Unknown error'));
            if (applyData.message && applyData.message.includes('already applied')) {
                window.location.href = `candidate-status.html?email=${encodeURIComponent(document.getElementById('candidateEmail').value.trim())}`;
            }
        }
    } catch (err) {
        console.error('Error:', err);
        alert('Error: ' + err.message);
    }
});

// Pre-fill job_id from query string if present (for display only)
if (jobIdFromUrl) {
    console.log('Job ID from URL:', jobIdFromUrl);
}
</script>

</div>

</body>
</html>
